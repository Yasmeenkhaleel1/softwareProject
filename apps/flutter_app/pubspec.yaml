name: flutter_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  fl_chart: ^0.66.0
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  provider: ^6.1.2
  intl: ^0.19.0
  table_calendar: ^3.0.9

  # ---------------- REQUIRED FOR PRO MAX UI ----------------
  lottie: ^2.6.0
  shimmer: ^3.0.0
  video_player: ^2.7.0
  # ---------------------------------------------------------

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/experts.png
    - assets/images/treasure_icon.png
    - assets/images/landing.png
    - assets/images/landing1.png
    - assets/images/profile_placeholder.png
